name: Backend Quality Gate

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      APP_API_KEY: test-api-key-for-ci
      APP_SECRET_KEY: test-secret-key-for-ci
      APP_ENV: test
      DATABASE_URL: sqlite:///./quality.db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all (Python 3.11 syntax gate)
        run: python -m compileall app/ -q

      - name: Import app (catch import-time errors)
        run: python -c "import app.main; print('import app.main OK')"

      - name: Verify route paths (no /api/api, logs + agent-runs mounted)
        run: |
          python - <<'PY'
          from app.main import app
          paths = {r.path for r in app.routes if hasattr(r, "path")}
          dup = [p for p in paths if p.startswith("/api/api")]
          assert not dup, f"duplicated /api/api prefix: {dup}"
          assert any(p.startswith("/api/logs") for p in paths), "missing /api/logs route"
          assert any(p.startswith("/api/agent-runs") for p in paths), "missing /api/agent-runs route"
          print("route paths OK")
          PY

      - name: Alembic single head
        run: |
          heads=$(python -m alembic heads 2>/dev/null | grep -c "(head)")
          echo "head count: $heads"
          test "$heads" -eq 1 || { echo "expected exactly 1 alembic head"; exit 1; }

      - name: Alembic upgrade head on clean DB
        run: |
          rm -f quality.db
          python -m alembic upgrade head


- name: Check for bare except clauses
  run: |
    count=$(grep -rn '^[[:space:]]*except:' backend/app/ | wc -l)
    echo "bare except count: $count"
    test "$count" -eq 0 || { echo "FAIL: bare except clauses found"; grep -rn '^[[:space:]]*except:' backend/app/; exit 1; }
    echo "bare except check: PASS"

- name: Model-Migration consistency check
  run: |
    python - <<'PY'
    import sys
    sys.path.insert(0, "backend")
    try:
        from app.database import engine, Base
        from app.models import *
        from sqlalchemy import inspect
        insp = inspect(engine)
        tables = insp.get_table_names()
        print("DB tables (" + str(len(tables)) + "): " + str(tables))
        import importlib
        missing = []
        for name, cls in Base.metadata.tables.items():
            if name not in tables:
                missing.append(name)
        if missing:
            print("FAIL: missing tables: " + str(missing))
            sys.exit(1)
        print("model-migration check: PASS (all " + str(len(Base.metadata.tables)) + " tables exist)")
    except Exception as e:
        print("model-migration check: SKIP (no DB or init failed): " + str(e))
    PY
