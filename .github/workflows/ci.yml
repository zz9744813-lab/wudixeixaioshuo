name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_API_KEY: test-api-key-for-ci
          APP_SECRET_KEY: test-secret-key-for-ci
          APP_ENV: test
          DATABASE_URL: sqlite:///./test.db

      - name: Check compilation
        run: python -m compileall app/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check build artifacts
        run: ls -la build/

      - name: Check frontend API usage
        run: npm run test:api-usage

  e2e:
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run E2E tests (MOCK)
        run: MOCK_LLM=1 python p4_memory_worker_e2e_test.py
        env:
          APP_API_KEY: test-api-key
          APP_SECRET_KEY: test-secret-key
          APP_ENV: test

  docker-health:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Start docker compose
        run: |
          APP_API_KEY=test-api-key-for-ci \
          APP_SECRET_KEY=test-secret-key-for-ci \
          docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/health/; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "⏳ Waiting for health check... ($i/30)"
            sleep 2
          done
          echo "❌ Health check failed"
          docker compose logs
          exit 1

      - name: Shutdown
        if: always()
        run: docker compose down -v
